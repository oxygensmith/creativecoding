{{ define "main" }}
<section class="page-section">
    <div class="container">
        <h1>{{ .Title }}</h1>
        <ul>
            {{ range .Data.Terms.Alphabetical }}
            <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a> ({{ .Count }})</li>
            {{ end }}
        </ul>
    </div>
</section>
{{ end }}
